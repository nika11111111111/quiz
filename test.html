<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{url_for('static',filename='style3.css')}}">
    <title>Викторина</title>
</head>
<body>
    <div class="container h2">
    <h2>{{question}}</h2>
    
    <form method="post" action="test">
    <input type="hidden" , name ="q_id" value="{{quest_id}}">
    <div class="list">
        {% for answer in answers_list %}
        <input type="radio" name="ans_text" value="{{ answer }}">{{ answer }}
        {% endfor %}
    </div>
    <div class="btn">
    <input type="submit" value="Ответить"></div></div>
    </form>
</body>
</html>
